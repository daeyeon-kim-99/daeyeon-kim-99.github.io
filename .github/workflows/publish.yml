name: Publish Quarto site (with notebook execution)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "quarto-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) Set up Python (needed to execute Jupyter notebooks)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 2) Install Python dependencies
      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            # Minimal default environment; add your own libs as needed
            pip install jupyter numpy pandas matplotlib
          fi
          # Ensure a kernel name Quarto/Jupyter can discover
          python -m ipykernel install --user --name=python3

      # 3) Install Quarto CLI
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "latest"   # Pin to a version if you want reproducibility

      # 4) Sanity check: verify Jupyter is available to Quarto
      - name: Check Jupyter availability
        run: quarto check jupyter

      # 5) Render the site (executes notebooks/code during the build)
      - name: Render Quarto site
        run: quarto render

      # 6) Upload the rendered site as a Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 7) Deploy the artifact to GitHub Pages
      - id: deployment
        uses: actions/deploy-pages@v4
